name: Claude Review

# Automated review of code changes using Claude Code.
# Jobs skip silently (green, not red) until a credential secret is set.
# Two options:
#   CLAUDE_CODE_OAUTH_TOKEN - runs on a Claude Pro/Max subscription.
#     Generate with 'claude setup-token', then
#     gh secret set CLAUDE_CODE_OAUTH_TOKEN
#   ANTHROPIC_API_KEY - Console API key, billed per use. Also the only
#     credential the security-review job accepts; that job stays skipped
#     on subscription-only auth.

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
  push:
    branches: [main]

concurrency:
  group: claude-review-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  pr-review:
    name: PR code review
    if: github.event_name == 'pull_request' && !github.event.pull_request.draft
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude code review
        if: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' || secrets.ANTHROPIC_API_KEY != '' }}
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          use_sticky_comment: true
          prompt: |
            Review this pull request as a senior engineer on this project.

            Read CLAUDE.md, CODING_STANDARDS.md, and .cursor/BUGBOT.md first;
            they define this repo's standards and hard scope boundaries.
            Review the PR diff against them, prioritized as follows:

            1. Hard boundary violations (lab generation staying spec-only,
               human-gated editorial approval, no cloud credentials, judgment
               skills kept off timers).
            2. Correctness bugs: concrete inputs or state that produce wrong
               output, crashes, or data loss. Pay attention to the SQLite
               layer (everything through scripts/db.py), scout idempotency on
               (scout, source_url), and pipeline/dedupe.py tier lookups.
            3. Missing or weakened tests at public seams (tests/ directory,
               behaviour tests over mocks).
            4. Spec drift: if the PR references an issue, check the change
               actually does what the issue asked.

            Post findings as inline comments on the relevant lines where
            possible. Keep the summary comment short: verdict first, then
            only findings that would change what the author does next. Do
            not pad with praise or style nits the linters already catch.
            No em-dashes in anything you post.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(git log:*),Bash(git diff:*),Bash(git show:*)"

  security-review:
    name: Security review
    if: github.event_name == 'pull_request' && !github.event.pull_request.draft
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 2

      - name: Claude security scan
        if: ${{ secrets.ANTHROPIC_API_KEY != '' }}
        # Pinned to a commit because this action receives the API key and
        # publishes no release tags. Bump the SHA deliberately, not via @main.
        uses: anthropics/claude-code-security-review@0c6a49f1fa56a1d472575da86a94dbc1edb78eda
        with:
          claude-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          comment-pr: true
          exclude-directories: "node_modules,transcripts,digests,curriculum,labs"
          claudecode-timeout: 20

  push-review:
    name: Review direct push to main
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude commit review
        if: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' || secrets.ANTHROPIC_API_KEY != '' }}
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Commits were pushed directly to main without a pull request.
            Review the pushed range ${{ github.event.before }}..${{ github.sha }}
            (use git log and git diff on that range; if the before SHA is all
            zeros, review only ${{ github.sha }} via git show).

            Read CLAUDE.md, CODING_STANDARDS.md, and .cursor/BUGBOT.md first.
            Look only for problems worth interrupting a human for: hard
            boundary violations, correctness bugs with a concrete failure
            scenario, leaked credentials, or deleted/weakened tests.

            If and only if you find such a problem, open a GitHub issue
            titled "Post-push review: <short summary>" with the label
            needs-triage, naming the commit SHA, the file and line, and the
            concrete failure scenario. If everything looks fine, post
            nothing and finish quietly. No em-dashes in anything you post.
          claude_args: |
            --allowedTools "Read,Grep,Glob,Bash(git log:*),Bash(git diff:*),Bash(git show:*),Bash(gh issue create:*),Bash(gh issue list:*)"

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        run: python -m pytest tests/ -q

  dashboard:
    name: Dashboard build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Seed empty SQLite for build
        # db/maes.sqlite3 is gitignored runtime state; build still imports
        # server components that open it (layout Ticker). Schema-only DB is enough.
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p db
          sqlite3 db/maes.sqlite3 < db/schema.sql

      - name: Production build
        run: npm run build
        env:
          MAES_DB_PATH: ${{ github.workspace }}/db/maes.sqlite3

      - name: Upload standalone build
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: dashboard-standalone
          path: dashboard/.next/standalone
          if-no-files-found: error
          retention-days: 14
